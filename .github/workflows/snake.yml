# Generates the animated contribution "snake" SVG referenced in README.md
# under Developer Insights Dashboard > Contribution Snake.
#
# Output is pushed to a dedicated `output` branch, which is what the README
# points to via raw.githubusercontent.com/<user>/<user>/output/snake*.svg
#
# No secrets required — uses the default GITHUB_TOKEN.

name: generate-snake

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch: {}       # allows manual "Run workflow" trigger
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: flingo777
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=tokyo-night&color_snake=%237aa2f7

      - name: Push generated files to the `output` branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
