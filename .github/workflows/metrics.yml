# Generates an extended metrics SVG (languages, activity, habits) using
# lowlighter/metrics, saved to assets/metrics.svg and embeddable in README.md.
#
# Requires: a Personal Access Token stored as the METRICS_TOKEN secret
# (classic PAT, scopes: repo, read:user — see docs/SETUP_GUIDE.md).

name: generate-metrics

on:
  schedule:
    - cron: "0 6 * * *"   # once a day
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: flingo777
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_habits: yes
          plugin_habits_charts_type: bars
          config_timezone: Asia/Kolkata
