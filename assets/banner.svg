<svg width="920" height="300" viewBox="0 0 920 300" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code',monospace" role="img" aria-label="Terminal banner for flingo777">
  <defs>
    <linearGradient id="tnBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#16161e"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- window -->
  <rect x="20" y="20" width="880" height="260" rx="14" fill="url(#tnBg)" stroke="#292e42" stroke-width="1.5" filter="url(#softShadow)"/>
  <rect x="20" y="20" width="880" height="260" rx="14" fill="none" stroke="url(#accentBar)" stroke-width="1" opacity="0.35"/>

  <!-- title bar -->
  <rect x="20" y="20" width="880" height="38" rx="14" fill="#1f2335"/>
  <rect x="20" y="44" width="880" height="14" fill="#1f2335"/>
  <circle cx="44" cy="39" r="6" fill="#f7768e"/>
  <circle cx="64" cy="39" r="6" fill="#e0af68"/>
  <circle cx="84" cy="39" r="6" fill="#9ece6a"/>
  <text x="460" y="44" fill="#565f89" font-size="13" text-anchor="middle">flingo777@cachyos: ~/portfolio</text>

  <!-- prompt lines -->
  <g font-size="16">
    <text x="46" y="98" fill="#9ece6a">➜</text>
    <text x="66" y="98" fill="#7aa2f7">~/dev</text>
    <text x="118" y="98" fill="#c0caf5">whoami</text>

    <text x="46" y="128" fill="#565f89">→</text>
    <text x="66" y="128" fill="#c0caf5">flingo777 · frontend engineer &amp; linux tinkerer</text>

    <text x="46" y="158" fill="#9ece6a">➜</text>
    <text x="66" y="158" fill="#7aa2f7">~/dev</text>
    <text x="118" y="158" fill="#c0caf5">neofetch --minimal</text>

    <text x="46" y="188" fill="#565f89">os</text>
    <text x="150" y="188" fill="#bb9af7">CachyOS</text>
    <text x="330" y="188" fill="#565f89">wm</text>
    <text x="380" y="188" fill="#bb9af7">Niri</text>
    <text x="520" y="188" fill="#565f89">shell</text>
    <text x="590" y="188" fill="#bb9af7">zsh</text>

    <text x="46" y="212" fill="#565f89">editor</text>
    <text x="150" y="212" fill="#7dcfff">neovim / vscode</text>
    <text x="420" y="212" fill="#565f89">stack</text>
    <text x="500" y="212" fill="#7dcfff">react.js</text>
  </g>

  <!-- blinking cursor line -->
  <g>
    <text x="46" y="246" fill="#9ece6a" font-size="16">➜</text>
    <text x="66" y="246" fill="#7aa2f7" font-size="16">~/dev</text>
    <rect x="120" y="233" width="10" height="18" fill="#c0caf5">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.51;0.99;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- bottom accent bar -->
  <rect x="20" y="272" width="880" height="4" rx="2" fill="url(#accentBar)"/>
</svg>
