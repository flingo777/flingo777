<svg width="920" height="120" viewBox="0 0 920 120" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code',monospace" role="img" aria-label="Footer terminal prompt">
  <defs>
    <linearGradient id="footerFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b26" stop-opacity="0"/>
      <stop offset="100%" stop-color="#16161e" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="920" height="120" fill="url(#footerFade)"/>
